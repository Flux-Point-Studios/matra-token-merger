name: python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # pycardano transitively pins a cbor2pure version whose
          # `__init__.py` imports `CBORDecodeValueError` from cbor2.
          # That symbol no longer exists in cbor2 >= 5.5; cbor2pure
          # 5.7.2 was released specifically to fix the import.
          # Force-upgrade past pycardano's transitive pin.
          pip install --upgrade "cbor2pure>=5.7.2"

      - name: pytest
        run: pytest -q
